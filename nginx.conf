server {
    listen 80;
    server_name trenibet.com www.trenibet.com localhost;

    # Serve i file statici del frontend
    root /usr/share/nginx/html;
    index index.html;

    # Gestisce il routing lato client
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy per il backend Django (API, Admin e Static)
    location ~ ^/(api|admin|static)/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Esclude cartelle inutili dal serving
    location ~ ^/(backend|node_modules|\.git) {
        deny all;
        return 404;
    }
}