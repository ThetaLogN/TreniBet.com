<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>TreniBet — Scommetti sui Ritardi dei Treni in Tempo Reale</title>
  <meta name="description" content="Scommetti sui ritardi dei treni italiani con TreniBet. Vivi l'emozione della sfida, scala la classifica e vinci token ogni giorno.">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://trenibet.com/">
  <meta property="og:title" content="TreniBet — Scommetti sui Ritardi dei Treni">
  <meta property="og:description" content="La prima piattaforma in tempo reale per scommettere sui ritardi dei treni in Italia.">
  <meta property="og:image" content="https://trenibet.com/assets/logo.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://trenibet.com/">
  <meta property="twitter:title" content="TreniBet — Scommetti sui Ritardi dei Treni">
  <meta property="twitter:description" content="Vivi l'emozione della sfida sui binari. Scommetti e scala la classifica!">
  <meta property="twitter:image" content="https://trenibet.com/assets/logo.png">

  <link rel="stylesheet" href="css/style.css?v=85">
  <link rel="icon" href="assets/logo.png?v=2">
</head>

<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="logo" onclick="App.showHomePage()" style="cursor: pointer;" title="Torna alla Home">
      <img src="assets/logo.png?v=2" alt="TreniBet Logo" class="logo-img">
      <span class="logo-text">TreniBET</span>
    </div>
    <div class="header-actions">
      <div id="user-wallet" class="user-wallet hidden">
        <span id="user-tokens" class="wallet-amount">0</span>
        <span class="wallet-icon">$</span>
      </div>
      <button class="btn-login" id="btn-login-header" onclick="App.showLoginModal()">Accedi</button>
      <button class="btn-login hidden" id="btn-profile-header" onclick="App.toggleMenu()"
        title="Apri menu">@User</button>
    </div>

    <!-- Dropdown Menu -->
    <div class="dropdown-menu" id="dropdown-menu">

      <a href="#" id="menu-bets-link" class="hidden" onclick="App.showMyBetsPage()">Le Mie Scommesse </a>
      <a href="#" id="menu-leaderboard-link" onclick="App.showLeaderboardPage()">Classifica</a>
      <a href="#" id="menu-wins-link" onclick="App.showWinsPage()">Ultime Vincite</a>
      <a href="#" id="menu-verify-link" class="hidden" onclick="App.resendVerificationEmail()">Invia email di verifica</a>
      <a href="#" id="dark-mode-toggle" onclick="App.toggleDarkMode()">Modalità Scura</a>
      <a href="#" id="menu-logout-link" class="hidden" onclick="App.logout()">Esci</a>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content"></main>

  <!-- Firebase Libraries (Compat version for simplicity in non-module environment) -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <script src="js/firebase.js?v=79"></script>
  <script src="js/data.js?v=79"></script>
  <script src="js/api.js?v=79"></script>
  <script src="js/components.js?v=82"></script>
  <script src="js/backend.js?v=79"></script>
  <script src="js/app.js?v=82"></script>
</body>

</html>
